<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="StudyGrind — AI-powered spaced repetition quiz app with FSRS scheduling" />
    <title>StudyGrind</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
    <link rel="apple-touch-icon" href="/study/pwa-192x192.png" />

    <!-- PWA / Mobile -->
    <meta name="theme-color" content="#1a1d2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StudyGrind" />
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <!-- Prevent dark mode FOUC: apply theme before React hydrates -->
    <script>
      try {
        var s = localStorage.getItem('studygrind_settings');
        if (s && JSON.parse(s).theme === 'dark') document.documentElement.classList.add('dark');
        else if (!s) document.documentElement.classList.add('dark'); // default is dark
      } catch (e) { document.documentElement.classList.add('dark'); }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
