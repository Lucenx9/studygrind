<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="StudyGrind — AI-powered spaced repetition quiz app with FSRS scheduling" />
    <title>StudyGrind</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/study/logo.svg" />
    <link rel="apple-touch-icon" href="/study/pwa-192x192.png" />

    <!-- PWA / Mobile -->
    <meta name="theme-color" content="#1a1d2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StudyGrind" />
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <script>
      try {
        const rawSettings = localStorage.getItem('studygrind_settings');
        const parsedSettings = rawSettings ? JSON.parse(rawSettings) : null;
        const theme = parsedSettings && typeof parsedSettings === 'object' ? parsedSettings.theme : null;
        const language = parsedSettings && typeof parsedSettings === 'object' ? parsedSettings.language : null;

        document.documentElement.lang = language === 'en' ? 'en' : 'it';
        if (theme !== 'light') {
          document.documentElement.classList.add('dark');
        }
      } catch {
        document.documentElement.lang = 'it';
        document.documentElement.classList.add('dark');
      }
    </script>
    <noscript>
      <div style="padding:2rem;text-align:center;font-family:system-ui,sans-serif;color:#e2e8f0">
        <h1>StudyGrind</h1>
        <p>JavaScript is required to run this application. Please enable it in your browser settings.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
